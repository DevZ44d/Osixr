# ─────────────────────────────────────────────────────────────────────────────
#  Publish — build and upload to PyPI on every version tag (v*)
#
#  Trigger: git tag v1.0.1 && git push --tags
# ─────────────────────────────────────────────────────────────────────────────

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build & publish
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      id-token: write   # required for trusted publishing (OIDC)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publisher (no API token needed)
        # Configure at: https://pypi.org/manage/project/osixr/settings/publishing/
